{% extends "base.html" %}
{% block title %}Editar Perfil{% endblock %}
{% block content %}
<h1>Editar Perfil</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar cambios</button>
</form>
<!-- Botón para cambiar la contraseña -->
<p>
    <a href="{% url 'users-cambiar-password' %}" class="btn btn-warning">
        Cambiar Contraseña
    </a>
</p>
<p><a href="{% url 'users-mi-perfil' %}">Volver a Mi Perfil</a></p>
{% endblock %}
