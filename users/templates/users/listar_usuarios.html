{% extends "base.html" %}
{% block title %}Lista de Usuarios{% endblock %}
{% block content %}
<h1>Usuarios Registrados</h1>
<ul>
    {% for usuario in object_list %}
        <li>
            <a href="{% url 'users-detallar' usuario.pk %}">{{ usuario.username }}</a>
        </li>
    {% endfor %}
</ul>
{% endblock %}
